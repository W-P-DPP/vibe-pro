# Production nginx layout for super-pro
#
# Recommended deployment:
# - Frontend dist files are served by nginx as static assets
# - Node services only serve APIs on internal ports
# - Public entry is unified under one host
#
worker_processes  1;

error_log  D:/Programs/nginx-1.26.3/logs/error.log;

events {
    worker_connections  1024;
}

http {
    include       D:/Programs/nginx-1.26.3/conf/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen       80;
        server_name  www.zwpsite.icu;

        client_max_body_size 32m;

        # ------------------------------
        # Static frontends
        # ------------------------------

        location = /zwpsite {
            return 301 /zwpsite/;
        }

        location /zwpsite/ {
            alias D:/Programs/nginx-1.26.3/html/zwpsite/;
            try_files $uri $uri/ /zwpsite/index.html;
        }

        location = /login {
            return 301 /login/;
        }

        location /login/ {
            alias D:/Programs/nginx-1.26.3/html/login/;
            try_files $uri $uri/ /login/index.html;
        }

        location = /agent {
            return 301 /agent/;
        }

        location /agent/ {
            alias D:/Programs/nginx-1.26.3/html/agent/;
            try_files $uri $uri/ /agent/index.html;
        }

        location = /reimburse {
            return 301 /reimburse/;
        }

        location /reimburse/ {
            alias D:/Programs/nginx-1.26.3/html/reimburse/;
            try_files $uri $uri/ /reimburse/index.html;
        }

        location = /summary-front {
            return 301 /summary-front/;
        }

        location /summary-front/ {
            alias D:/Programs/nginx-1.26.3/html/summary-front/;
            try_files $uri $uri/ /summary-front/index.html;
        }

        location = /resume {
            return 301 /resume/;
        }

        location /resume/ {
            alias D:/Programs/nginx-1.26.3/html/resume/;
            try_files $uri $uri/ /resume/index.html;
        }

        # Compatibility redirect because the current site menu still points to /zwpsummary/
        # If you want to keep /zwpsummary/ permanently, change summary-front Vite base to /zwpsummary/
        # and replace this redirect with a dedicated static location.
        location = /zwpsummary {
            return 301 /summary-front/;
        }

        location /zwpsummary/ {
            return 301 /summary-front/;
        }

        location = /file-server {
            return 301 /file-server/;
        }

        location /file-server/ {
            alias D:/Programs/nginx-1.26.3/html/file-server/;
            try_files $uri $uri/ /file-server/index.html;
        }

        # Long cache for built assets
        location ~* ^/(zwpsite|login|agent|reimburse|summary-front|resume|file-server)/assets/ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        location ~* ^/public/ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        # ------------------------------
        # API reverse proxy
        # ------------------------------

        location = /api {
            return 301 /api/;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:30010/api/;
            proxy_http_version 1.1;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /public/ {
            alias D:/Programs/nginx-1.26.3/html/public/;
            try_files $uri =404;
        }

        location = /agent-api {
            return 301 /agent-api/;
        }

        location /agent-api/ {
            proxy_pass http://127.0.0.1:30012/api/;
            proxy_http_version 1.1;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /reimburse-api {
            return 301 /reimburse-api/;
        }

        location /reimburse-api/ {
            proxy_pass http://127.0.0.1:30022/api/;
            proxy_http_version 1.1;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------
        # Other reverse proxies kept from current environment
        # ------------------------------

        location = /openclaw {
            proxy_pass http://127.0.0.1:18789;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /openclaw/ {
            proxy_pass http://127.0.0.1:18789;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location = /jenkins {
            return 301 /jenkins/;
        }

        location /jenkins/ {
            proxy_pass http://127.0.0.1:8080/jenkins/;
            proxy_http_version 1.1;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

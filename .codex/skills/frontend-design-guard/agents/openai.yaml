interface:
  display_name: "Frontend Design Guard"
  short_description: "Read design.md first, use the shadcn theme, preserve API/auth contracts, and keep UI restrained."
  default_prompt: "Use $frontend-design-guard for frontend work in this repository. Read frontend-template/design.md first, then the bundled shadcn theme reference. Keep UI restrained unless asked otherwise, default copy to Simplified Chinese, centralize API calls in src/api/modules, preserve backend response envelopes, reuse shared-web/shared-types where available, and handle auth redirects for 401/403."

policy:
  allow_implicit_invocation: true

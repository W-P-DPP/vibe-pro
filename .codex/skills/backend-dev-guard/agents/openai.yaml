interface:
  display_name: "Backend Dev Guard"
  short_description: "Enforce backend layering, shared-server infrastructure, typed config, secure logging, and tests."
  default_prompt: "Use $backend-dev-guard for backend work in this repository. Inspect the code first, prefer packages/shared-server for reusable infrastructure, keep router/controller/service/repository/entity/dto boundaries clear, use typed config, sanitize logs, preserve API contracts, and run focused validation."

policy:
  allow_implicit_invocation: true

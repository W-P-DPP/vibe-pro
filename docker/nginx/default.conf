server {
    listen 80;
    server_name _;
    absolute_redirect off;

    client_max_body_size 512m;
    client_body_timeout 3600s;
    send_timeout 3600s;

    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location = / {
        return 301 /zwpsite/;
    }

    location = /zwpsite {
        return 301 /zwpsite/;
    }

    location /zwpsite/ {
        alias /usr/share/nginx/html/zwpsite/;
        try_files $uri $uri/ /zwpsite/index.html;
    }

    location = /login {
        return 301 /login/;
    }

    location /login/ {
        alias /usr/share/nginx/html/login/;
        try_files $uri $uri/ /login/index.html;
    }

    location = /agent {
        return 301 /agent/;
    }

    location /agent/ {
        alias /usr/share/nginx/html/agent/;
        try_files $uri $uri/ /agent/index.html;
    }

    location = /reimburse {
        return 301 /reimburse/;
    }

    location /reimburse/ {
        alias /usr/share/nginx/html/reimburse/;
        try_files $uri $uri/ /reimburse/index.html;
    }

    location = /summary-front {
        return 301 /summary-front/;
    }

    location /summary-front/ {
        alias /usr/share/nginx/html/summary-front/;
        try_files $uri $uri/ /summary-front/index.html;
    }

    location = /zwpsummary {
        return 301 /summary-front/;
    }

    location /zwpsummary/ {
        return 301 /summary-front/;
    }

    location = /file-server {
        return 301 /file-server/;
    }

    location /file-server/ {
        alias /usr/share/nginx/html/file-server/;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /file-server/index.html;
    }

    location = /resume {
        return 301 /resume/;
    }

    location /resume/ {
        alias /usr/share/nginx/html/resume/;
        try_files $uri $uri/ /resume/index.html;
    }

    location /zwpsite/assets/ {
        alias /usr/share/nginx/html/zwpsite/assets/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /login/assets/ {
        alias /usr/share/nginx/html/login/assets/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /agent/assets/ {
        alias /usr/share/nginx/html/agent/assets/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /reimburse/assets/ {
        alias /usr/share/nginx/html/reimburse/assets/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /summary-front/assets/ {
        alias /usr/share/nginx/html/summary-front/assets/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /file-server/assets/ {
        alias /usr/share/nginx/html/file-server/assets/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /resume/assets/ {
        alias /usr/share/nginx/html/resume/assets/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location = /api {
        return 301 /api/;
    }

    location /api/ {
        proxy_pass http://general-server:30010/api/;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /public/ {
        proxy_pass http://general-server:30010/public/;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /agent-api {
        return 301 /agent-api/;
    }

    location /agent-api/ {
        proxy_pass http://agent-server:30012/api/;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /reimburse-api {
        return 301 /reimburse-api/;
    }

    location /reimburse-api/ {
        proxy_pass http://reimburse-server:30022/api/;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
